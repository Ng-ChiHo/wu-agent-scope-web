# Nginx 配置示例 — 放在 /etc/nginx/conf.d/agentapi.conf
server {
    listen 443 ssl;
    server_name agentapi.xpeak.top;

    # SSL 证书（根据实际路径修改）
    ssl_certificate     /etc/nginx/ssl/agentapi.xpeak.top.pem;
    ssl_certificate_key /etc/nginx/ssl/agentapi.xpeak.top.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /api/ {
        proxy_pass http://127.0.0.1:8133/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持（关键）
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name agentapi.xpeak.top;
    return 301 https://$host$request_uri;
}
